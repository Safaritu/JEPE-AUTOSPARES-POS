<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEPE POS | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4f46e5; --primary-dark: #3730a3;
            --bg: #f1f5f9; --card-bg: #ffffff; 
            --danger: #e11d48; --success: #10b981; --warning: #f59e0b;
            --nav-btn-bg: #6366f1; --text-main: #1e293b; --text-dim: #64748b;
            --border: #e2e8f0; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); padding: 10px; padding-left: 80px; margin: 0; color: var(--text-main); line-height: 1.5; overflow-x: hidden; width: 100%; }
        @media (max-width: 1024px) { body { padding-left: 10px; } }
        .container { max-width: 1450px; margin: auto; width: 100%; }
        header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; padding: 20px; background: #fff; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        @media (min-width: 768px) { header { flex-direction: row; justify-content: space-between; align-items: center; } }
        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; color: #111827; }
        .logo span { color: var(--primary); font-weight: 500; font-size: 0.9rem; margin-left: 5px; opacity: 0.8; }
        .float-status-card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 600px) { .float-status-card { grid-template-columns: repeat(5, 1fr); } }
        .float-item { text-align: center; }
        .float-item label { display: block; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }
        .float-item span { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        .card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--primary); margin-bottom: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .section-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .grid-inputs { display: grid; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { margin-bottom: 6px; font-weight: 700; color: var(--text-main); font-size: 0.75rem; }
        input, select { background: #f8fafc; border: 1px solid var(--border); padding: 14px; border-radius: 12px; font-size: 16px; width: 100%; }
        .btn { padding: 16px 24px; border-radius: 12px; font-weight: 800; cursor: pointer; border: none; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .shift-modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); display: none; align-items: center; justify-content: center; z-index: 100000; backdrop-filter: blur(8px); padding: 20px; }
        .modal { background: #fff; padding: 25px; border-radius: 24px; width: 100%; max-width: 500px; }
        .table-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; background: #f8fafc; text-align: left; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">JEPE POS <span>/ Terminal</span></div>
        <div id="shift-action-container"></div>
    </header>

    <div class="section-label">Opening Wallet Balances</div>
    <div class="float-status-card">
        <div class="float-item"><label>Cash</label><span id="float-cash">0</span></div>
        <div class="float-item"><label>Mpesa</label><span id="float-mpesa">0</span></div>
        <div class="float-item"><label>KCB Paybill</label><span id="float-kcb">0</span></div>
        <div class="float-item"><label>Equity</label><span id="float-equity">0</span></div>
        <div class="float-item"><label>KCB Bank</label><span id="float-bank">0</span></div>
        <div class="float-item kitui-only" style="display:none;"><label>Family Bank</label><span id="float-family-bank">0</span></div>
        <div class="float-item kitui-only" style="display:none;"><label>Cooperative Bank</label><span id="float-cooperative-bank">0</span></div>
    </div>

    <div class="card">
        <form id="sale-form">
            <div class="grid-inputs" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
                <div class="input-group">
                    <label>Search Item</label>
                    <input type="text" id="pSearch" list="pList" placeholder="Find Item..." required>
                    <datalist id="pList"></datalist>
                </div>
                <div class="input-group"><label>Price (Ksh)</label><input type="number" id="pPrice" step="0.01" required></div>
                <div class="input-group"><label>Qty</label><input type="number" id="pQty" value="1" min="1"></div>
                <div class="input-group">
                    <label>Method</label>
                    <select id="pMethod" onchange="toggleSplitFields()">
                        <option value="Cash">Cash (Shop)</option>
                        <option value="Mpesa">KCB / Paybill</option>
                        <option value="KCB Bank">KCB Bank (Account)</option>
                        <option value="Split">Split: Cash + Paybill</option>
                        <option value="Debt">Debtor</option>
                    </select>
                </div>
            </div>
            <div id="split-fields" style="display:none; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                <input type="number" id="split-cash" placeholder="Cash Amount" oninput="calculateSplit()">
                <input type="number" id="split-online" placeholder="Online Balance" readonly>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top:20px; width:100%;">RECORD Ksh <span id="total-text">0</span></button>
        </form>
    </div>

    <div class="section-label">LIVE SALES</div>
    <div class="table-card"><table id="sales-table"><thead><tr><th>Time</th><th>Item</th><th>Qty</th><th>Total</th><th>Method</th></tr></thead><tbody id="live-sales-body"></tbody></table></div>
</div>

<div id="open-modal" class="shift-modal-overlay">
    <div class="modal">
        <h3>🚀 Start Shift</h3>
        <input type="number" id="o-cash" placeholder="Cash Float" style="margin-bottom:10px;">
        <input type="number" id="o-mpesa" placeholder="Mpesa Float" style="margin-bottom:10px;">
        <input type="number" id="o-kcb" placeholder="Paybill Float" style="margin-bottom:10px;">
        <input type="number" id="o-equity" placeholder="Equity Float" style="margin-bottom:10px;">
        <input type="number" id="o-bank" placeholder="KCB Bank Balance" style="margin-bottom:10px;">
        <input type="number" id="o-family-bank" placeholder="Family Bank Float" class="kitui-only" style="display:none; margin-bottom:10px;">
        <input type="number" id="o-cooperative-bank" placeholder="Cooperative Bank Float" class="kitui-only" style="display:none; margin-bottom:10px;">
        <button class="btn btn-primary" id="confirm-open" style="width:100%">OPEN DAY</button>
    </div>
</div>

<div id="close-modal" class="shift-modal-overlay">
    <div class="modal">
        <h3>🔒 Close Shift</h3>
        <input type="number" id="c-cash" placeholder="Actual Cash" style="margin-bottom:10px;">
        <input type="number" id="c-mpesa" placeholder="Actual Mpesa" style="margin-bottom:10px;">
        <input type="number" id="c-kcb" placeholder="Actual Paybill" style="margin-bottom:10px;">
        <input type="number" id="c-equity" placeholder="Actual Equity" style="margin-bottom:10px;">
        <input type="number" id="c-bank" placeholder="Actual KCB Bank" style="margin-bottom:10px;">
        <input type="number" id="c-family-bank" placeholder="Actual Family Bank" class="kitui-only" style="display:none; margin-bottom:10px;">
        <input type="number" id="c-cooperative-bank" placeholder="Actual Cooperative Bank" class="kitui-only" style="display:none; margin-bottom:10px;">
        <button class="btn btn-danger" id="confirm-close" style="width:100%">CLOSE DAY</button>
    </div>
</div>

<script type="module">
    import { supabase } from './auth.js';
    import { mountCashierNav } from './cashier-nav.js';
    import { showToast } from './ui.js';
    let inventory = [], currentShift = null, selectedItem = null;
    let currentBranchId = null;
    let currentUser = null;
    let isKituiBranch = false;

    window.toggleSplitFields = () => {
        const isSplit = document.getElementById('pMethod').value === 'Split';
        document.getElementById('split-fields').style.display = isSplit ? 'grid' : 'none';
    };

    window.calculateSplit = () => {
        const price = parseFloat(document.getElementById('pPrice').value) || 0;
        const qty = parseInt(document.getElementById('pQty').value) || 0;
        const total = price * qty;
        const cash = parseFloat(document.getElementById('split-cash').value) || 0;
        document.getElementById('split-online').value = Math.max(total - cash, 0);
    };

    function toggleKituiFields(show) {
        document.querySelectorAll('.kitui-only').forEach(el => {
            el.style.display = show ? 'block' : 'none';
        });
    }

    async function init() {
        mountCashierNav();
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return window.location.href = 'index.html';
        currentUser = user;

        const { data: profile } = await supabase.from('profiles').select('*, branches(*)').eq('id', user.id).single();
        if (!profile) return window.location.href = 'index.html';
        currentBranchId = profile.branch_id;
        isKituiBranch = (profile.branches?.name || '').toLowerCase().includes('kitui');
        toggleKituiFields(isKituiBranch);

        const { data: prods } = await supabase.from('products').select('*').eq('branch_id', currentBranchId);
        inventory = prods || [];
        document.getElementById('pList').innerHTML = inventory.map(p => `<option value="${p.name}">`).join('');

        const { data: shift } = await supabase.from('daily_shifts').select('*').eq('branch_id', currentBranchId).eq('status', 'Open').maybeSingle();
        const actionBtnContainer = document.getElementById('shift-action-container');
        if (shift) {
            currentShift = shift;
            actionBtnContainer.innerHTML = `<button class="btn btn-danger" onclick="document.getElementById('close-modal').style.display='flex'">🔴 CLOSE DAY</button>`;
            document.getElementById('float-cash').innerText = (shift.open_cash || 0).toLocaleString();
            document.getElementById('float-mpesa').innerText = (shift.open_mpesa || 0).toLocaleString();
            document.getElementById('float-kcb').innerText = (shift.open_kcb || 0).toLocaleString();
            document.getElementById('float-equity').innerText = (shift.open_equity || 0).toLocaleString();
            document.getElementById('float-bank').innerText = (shift.open_kcb_bank || 0).toLocaleString();
            if (isKituiBranch) {
                document.getElementById('float-family-bank').innerText = (shift.open_family_bank || 0).toLocaleString();
                document.getElementById('float-cooperative-bank').innerText = (shift.open_cooperative_bank || 0).toLocaleString();
            }
            loadSales();
        } else {
            actionBtnContainer.innerHTML = `<button class="btn btn-primary" onclick="document.getElementById('open-modal').style.display='flex'">🟢 START DAY</button>`;
        }
    }

    document.getElementById('sale-form').onsubmit = async (e) => {
        e.preventDefault();
        const method = document.getElementById('pMethod').value;
        const price = parseFloat(document.getElementById('pPrice').value);
        const qty = parseInt(document.getElementById('pQty').value);
        const itemName = document.getElementById('pSearch').value;
        const total = price * qty;

        const product = inventory.find(p => p.name === itemName);
        if (!product) { showToast('Select a valid item from the list', 'warning'); return; }

        // payment_method has a DB CHECK constraint (Cash/Mpesa/Bank/KCB Paybill/Debt) -
        // 'KCB Bank' isn't one of the allowed values, so it's mapped to 'Bank'.
        const baseSale = {
            shift_id: currentShift.id,
            product_id: product.id,
            item_name: itemName,
            category: product.category,
            quantity: qty,
            unit_price: price,
            cost_price: product.cost_price || 0,
            branch_id: currentBranchId,
            user_id: currentUser.id
        };

        let salesToInsert;
        if (method === 'Split') {
            const cashAmt = parseFloat(document.getElementById('split-cash').value) || 0;
            if (cashAmt <= 0 || cashAmt >= total) {
                showToast('Enter a cash amount between 0 and the total for a split sale', 'warning');
                return;
            }
            const onlineAmt = total - cashAmt;
            salesToInsert = [
                { ...baseSale, item_name: `${itemName} (Split-Cash)`, total_amount: cashAmt, payment_method: 'Cash' },
                { ...baseSale, item_name: `${itemName} (Split-Paybill)`, quantity: 0, cost_price: 0, total_amount: onlineAmt, payment_method: 'KCB Paybill' }
            ];
        } else {
            const dbMethod = method === 'KCB Bank' ? 'Bank' : method;
            salesToInsert = [{ ...baseSale, total_amount: total, payment_method: dbMethod }];
        }

        const { error } = await supabase.from('sales').insert(salesToInsert);
        if (error) { showToast('Error recording sale: ' + error.message, 'error'); return; }

        location.reload();
    };

    document.getElementById('confirm-open').onclick = async () => {
        const openData = {
            branch_id: currentBranchId,
            open_cash: parseFloat(document.getElementById('o-cash').value || 0),
            open_mpesa: parseFloat(document.getElementById('o-mpesa').value || 0),
            open_kcb: parseFloat(document.getElementById('o-kcb').value || 0),
            open_equity: parseFloat(document.getElementById('o-equity').value || 0),
            open_kcb_bank: parseFloat(document.getElementById('o-bank').value || 0),
            status: 'Open', start_time: new Date().toISOString()
        };
        if (isKituiBranch) {
            openData.open_family_bank = parseFloat(document.getElementById('o-family-bank').value || 0);
            openData.open_cooperative_bank = parseFloat(document.getElementById('o-cooperative-bank').value || 0);
        }
        await supabase.from('daily_shifts').insert([openData]);
        location.reload();
    };

    document.getElementById('confirm-close').onclick = async () => {
        if (!currentShift) return;
        const closeData = {
            close_cash: parseFloat(document.getElementById('c-cash').value || 0),
            close_mpesa: parseFloat(document.getElementById('c-mpesa').value || 0),
            close_kcb: parseFloat(document.getElementById('c-kcb').value || 0),
            close_equity: parseFloat(document.getElementById('c-equity').value || 0),
            close_kcb_bank: parseFloat(document.getElementById('c-bank').value || 0),
            status: 'Closed', end_time: new Date().toISOString()
        };
        if (isKituiBranch) {
            closeData.close_family_bank = parseFloat(document.getElementById('c-family-bank').value || 0);
            closeData.close_cooperative_bank = parseFloat(document.getElementById('c-cooperative-bank').value || 0);
        }
        await supabase.from('daily_shifts').update(closeData).eq('id', currentShift.id);
        location.reload();
    };

    init();
</script>
</body>
</html>
