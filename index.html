<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEPE AUTOSPARES | Secure Staff Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; 
            --accent: #818cf8;
            --bg: #0b1120; 
            --glass: rgba(30, 41, 59, 0.75); 
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top left, #1e1b4b, #0b1120); 
            color: white; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Better for scrolling on short phones */
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; 
            position: relative;
        }

        /* --- FLOATING BACKGROUND IMAGES --- */
        .bg-decor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-img {
            position: absolute;
            filter: brightness(0.4) contrast(1.2);
            border-radius: 20px;
            animation: float 8s ease-in-out infinite;
            opacity: 0.3;
        }

        .img-bike { top: 5%; left: -10%; width: 250px; --rot: -10deg; }
        .img-helmet { bottom: 5%; right: -5%; width: 150px; --rot: 15deg; animation-delay: 1s; }
        .img-spanner { top: 10%; right: 2%; width: 80px; --rot: 25deg; animation-delay: 2s; }
        .img-exhaust { bottom: 10%; left: -5%; width: 180px; --rot: -20deg; animation-delay: 3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(var(--rot)); }
            50% { transform: translateY(-20px) rotate(calc(var(--rot) + 5deg)); }
        }

        /* --- UI COMPONENTS --- */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            padding: 20px 15px; /* Reduced side padding for mobile */
            z-index: 10;
            box-sizing: border-box;
        }

        .auth-card { 
            background: var(--glass); 
            padding: 30px 25px; /* Thinner padding for mobile */
            border-radius: 24px; 
            width: 100%; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(15px); 
            border: 1px solid var(--border);
            text-align: center;
            box-sizing: border-box;
        }

        .logo-box { 
            background: linear-gradient(135deg, var(--primary), #4f46e5); 
            width: 60px; height: 60px; line-height: 60px; 
            border-radius: 18px; margin: 0 auto 15px; 
            font-size: 28px; font-weight: 800; 
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        .brand-name {
            font-size: 1.6rem; font-weight: 800; letter-spacing: -1px; margin: 0;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        h2 { font-weight: 600; margin: 8px 0 4px 0; font-size: 1.2rem; color: #f8fafc; }
        .tagline { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }

        input, select, button { 
            width: 100%; padding: 12px; margin: 8px 0; 
            border-radius: 10px; border: 1px solid var(--border); 
            box-sizing: border-box; font-size: 0.95rem; transition: 0.3s;
        }

        input, select { background: rgba(15, 23, 42, 0.6); color: white; outline: none; }
        input:focus { border-color: var(--primary); background: rgba(15, 23, 42, 0.8); }

        button { 
            background: var(--primary); color: white; font-weight: 800; 
            cursor: pointer; border: none; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .banking-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        .banking-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .logo-flex { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .bank-img { height: 18px; filter: brightness(0) invert(1); opacity: 0.7; }

        .toggle-link { text-align: center; font-size: 0.85rem; margin-top: 15px; cursor: pointer; color: #94a3b8; }
        .toggle-link b { color: var(--primary); text-decoration: underline; }

        .saftech-footer {
            margin: 20px 0; text-align: center; padding: 12px;
            border-radius: 18px; background: rgba(255, 255, 255, 0.03);
            width: 100%; box-sizing: border-box;
        }
        .saftech-footer h4 { font-size: 0.65rem; text-transform: uppercase; color: var(--primary); margin: 0 0 4px 0; }
        .contact-info { font-weight: 600; color: #ffffff; margin-top: 4px; font-size: 0.8rem; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="bg-decor">
    <img src="https://images.unsplash.com/photo-1558981403-c5f9899a28bc?q=80&w=600" class="bg-img img-bike" alt="Bike">
    <img src="https://images.unsplash.com/photo-1591637333184-19aa84b3e01f?q=80&w=400" class="bg-img img-exhaust" alt="Exhaust">
    <img src="https://images.unsplash.com/photo-1611691934391-5a8805ee0d9a?q=80&w=400" class="bg-img img-helmet" alt="Helmet">
    <img src="https://images.unsplash.com/photo-1621252179027-94459d278660?q=80&w=300" class="bg-img img-spanner" alt="Spanner">
</div>

<div class="container">
    <div class="auth-card">
        <div class="logo-box">J</div>
        <h1 class="brand-name">JEPE AUTOSPARES</h1>
        <h2 id="auth-title">Staff Sign In</h2>
        <p class="tagline" id="auth-subtitle">Excellence in Spares & Banking.</p>
        
        <div id="success-msg" class="hidden"></div>

        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        
        <div id="register-fields" class="hidden">
            <select id="role">
                <option value="cashier">Cashier Access</option>
                <option value="admin">Administrator Access</option>
            </select>
        </div>

        <button id="main-btn" onclick="handleAuth()">Sign In</button>
        
        <div class="toggle-link" onclick="toggleMode()" id="toggle-text">
            New staff? <b>Create Account</b>
        </div>

        <div class="banking-section">
            <div class="banking-label">Partner Banking Channels</div>
            <div class="logo-flex">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/3/30/KCB_Group_logo.svg/1200px-KCB_Group_logo.svg.png" class="bank-img" alt="KCB">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Equity_Bank_Logo.png/640px-Equity_Bank_Logo.png" class="bank-img" alt="Equity">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/M-PESA_LOGO-01.svg/1200px-M-PESA_LOGO-01.svg.png" class="bank-img" alt="M-Pesa">
            </div>
        </div>
    </div>

    <div class="saftech-footer">
        <h4>System by SAFTECH</h4>
        <p style="font-size: 0.8rem; margin:0;">Engineered by <b>Alex Safari</b></p>
        <p class="contact-info">📞 0794963537 / 0707441702</p>
    </div>
</div>

<script type="module">
    import { supabase } from './auth.js';

    let isLogin = true;

    window.toggleMode = () => {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "Staff Sign In" : "New Registration";
        document.getElementById('register-fields').classList.toggle('hidden', isLogin);
        document.getElementById('main-btn').innerText = isLogin ? "Sign In" : "Register Now";
        document.getElementById('toggle-text').innerHTML = isLogin ? 
            "New staff? <b>Create Account</b>" : "Already a member? <b>Sign In</b>";
    };

    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;
        const btn = document.getElementById('main-btn');

        if (!email || !password) return alert("Please fill in all fields.");
        
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            if (isLogin) {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                await checkRoleAndRedirect(data.user.id);
            } else {
                const { data, error } = await supabase.auth.signUp({ 
                    email, password, options: { data: { role: role } } 
                });
                if (error) throw error;
                await supabase.from('profiles').upsert({ id: data.user.id, role: role, email: email });
                alert("Registration successful! You may now sign in.");
                toggleMode();
            }
        } catch (err) {
            alert(err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = isLogin ? "Sign In" : "Register Now";
        }
    };

    async function checkRoleAndRedirect(userId) {
        const { data } = await supabase.from('profiles').select('role').eq('id', userId).single();
        if (data) {
            window.location.href = (data.role === 'admin') ? 'admin.html' : 'cashier.html';
        } else {
            alert("Setting up profile... Please wait and sign in again.");
            await supabase.auth.signOut();
        }
    }
</script>
</body>
</html>
