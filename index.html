<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEPE AUTOSPARES | SAFTECH Systems</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; 
            --accent: #818cf8;
            --glass: rgba(7, 10, 25, 0.92); 
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: 
                linear-gradient(rgba(11, 17, 32, 0.6), rgba(11, 17, 32, 0.7)),
                url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?auto=format&fit=crop&q=80&w=1000') center center / cover no-repeat fixed;
            color: white; 
            /* Fix for mobile address bar */
            height: 100vh;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centers the content vertically */
            padding: 10px;
            gap: 10px;
            width: 100%;
        }

        @media (min-width: 1024px) {
            .main-stage { flex-direction: row; gap: 60px; padding: 40px; }
        }

        .info-panel {
            text-align: center;
            max-width: 450px;
            animation: fadeIn 1s ease-out;
        }

        @media (min-width: 1024px) {
            .info-panel { text-align: left; }
            .info-panel h2 { font-size: 3rem; }
        }

        .info-panel h2 { 
            font-size: 1.4rem; 
            font-weight: 800;
            margin-bottom: 4px;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
            line-height: 1.2;
        }

        .info-panel p { font-size: 0.85rem; line-height: 1.3; opacity: 0.9; margin-bottom: 8px; }
        
        .feature-list { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 6px; 
            list-style: none;
        }

        .feature-list li {
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        .auth-card { 
            background: var(--glass); 
            padding: 18px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 340px;
            backdrop-filter: blur(15px); 
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-box { 
            background: var(--primary); 
            width: 40px; height: 40px; line-height: 40px; 
            border-radius: 10px; margin: 0 auto 8px; 
            font-size: 18px; font-weight: 800; 
        }

        .brand-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 2px; }
        .tagline { color: var(--accent); font-size: 0.8rem; margin-bottom: 12px; }

        input, select, button { 
            width: 100%; padding: 10px; margin: 4px 0; 
            border-radius: 8px; border: 1px solid var(--border); 
            font-size: 0.9rem; font-weight: 600;
        }

        input { background: rgba(0, 0, 0, 0.4); color: white; outline: none; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; margin-top: 8px; }

        /* FIXED FOOTER POSITIONING */
        .footer {
            background: #000;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            border-top: 2px solid var(--primary);
            flex-shrink: 0; /* Ensures footer doesn't get squeezed */
        }

        .contact-box { text-align: right; }
        .contact-phone { font-weight: 800; display: block; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="main-stage">
    <div class="info-panel">
        <h2>JEPE AUTOSPARES</h2>
        <p>Premium gateway for Spare Parts, Bikes & ERP Logistics.</p>
        <ul class="feature-list">
            <li>Inventory</li>
            <li>Payments</li>
            <li>ERP Systems</li>
        </ul>
    </div>

    <div class="auth-card">
        <div class="logo-box">J</div>
        <h1 class="brand-name">PORTAL</h1>
        <p class="tagline">Authorized Staff Only</p>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        
        <div id="register-fields" class="hidden">
            <select id="role">
                <option value="cashier">Cashier</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <button id="main-btn" onclick="handleAuth()">Sign In</button>
        
        <div onclick="toggleMode()" id="toggle-text" style="margin-top:8px; cursor:pointer; font-size: 0.75rem; color: #bbb;">
            New? <b style="color:var(--accent)">Register</b>
        </div>
    </div>
</div>

<footer class="footer">
    <div>
        <div style="font-weight: 800; color: var(--accent); letter-spacing: 0.5px;">SAFTECH SYSTEMS</div>
        <div style="opacity: 0.8;">Alex Safari — Engineer</div>
    </div>
    <div class="contact-box">
        <span class="contact-phone">0794963537</span>
        <span style="opacity: 0.8;">saftech@gmail.com</span>
    </div>
</footer>

<script type="module">
    import { supabase } from './auth.js';
    let isLogin = true;

    window.toggleMode = () => {
        isLogin = !isLogin;
        document.getElementById('register-fields').classList.toggle('hidden');
        document.getElementById('main-btn').innerText = isLogin ? "Sign In" : "Register";
        document.getElementById('toggle-text').innerHTML = isLogin ? 
            "New? <b style='color:var(--accent)'>Register</b>" : "Member? <b style='color:var(--accent)'>Sign In</b>";
    };

    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('main-btn');

        if (!email || !password) return alert("Fields required.");
        btn.disabled = true; btn.innerText = "...";

        try {
            if (isLogin) {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                checkRoleAndRedirect(data.user.id);
            } else {
                const role = document.getElementById('role').value;
                const { error } = await supabase.auth.signUp({ email, password, options: { data: { role } } });
                if (error) throw error;
                alert("Account created!"); toggleMode();
            }
        } catch (err) { alert(err.message); } 
        finally { btn.disabled = false; btn.innerText = isLogin ? "Sign In" : "Register"; }
    };

    async function checkRoleAndRedirect(userId) {
        const { data } = await supabase.from('profiles').select('role').eq('id', userId).single();
        window.location.href = (data?.role === 'admin') ? 'admin.html' : 'cashier.html';
    }
</script>
</body>
</html>
