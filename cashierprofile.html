<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings | JEPE CASHIER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            margin-left: 70px;
        }

        @media (max-width: 1024px) {
            body { margin-left: 0; padding-top: 64px; }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-header { margin-bottom: 25px; }
        .page-header h1 { font-size: 1.4rem; font-weight: 800; }
        .page-header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }

        .card {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .card h2 {
            font-size: 0.95rem;
            font-weight: 800;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2 i { color: var(--primary); }

        .field { margin-bottom: 16px; }
        .field:last-child { margin-bottom: 0; }
        .field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .field input:focus { outline: none; border-color: var(--primary); }
        .field input[readonly] {
            background: #f1f5f9;
            color: var(--text-dim);
            cursor: not-allowed;
        }
        .field .hint { font-size: 0.7rem; color: var(--text-dim); margin-top: 5px; }

        .btn {
            padding: 12px 22px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,.4);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1><i class="fas fa-user-circle"></i> Settings</h1>
        <p>Manage your account details and password</p>
    </div>

    <div id="loading-state" class="loading-state">
        <div class="spinner" style="border-top-color: var(--primary); width: 24px; height: 24px; border-width: 3px;"></div>
        <p style="margin-top: 10px;">Loading your profile...</p>
    </div>

    <div id="profile-content" style="display: none;">
        <div class="card">
            <h2><i class="fas fa-id-card"></i> Account Details</h2>
            <div class="field">
                <label>Full Name</label>
                <input type="text" id="full-name" placeholder="Your name">
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" readonly>
                <div class="hint">Email is tied to your login and can't be changed here - ask an admin if it needs updating.</div>
            </div>
            <div class="field">
                <label>Branch</label>
                <input type="text" id="branch-name" readonly>
            </div>
            <div class="field" style="margin-top: 20px;">
                <button class="btn btn-primary" id="save-name-btn">Save Name</button>
            </div>
        </div>

        <div class="card">
            <h2><i class="fas fa-lock"></i> Change Password</h2>
            <div class="field">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="At least 6 characters" autocomplete="new-password">
            </div>
            <div class="field">
                <label>Confirm New Password</label>
                <input type="password" id="confirm-password" placeholder="Re-enter new password" autocomplete="new-password">
            </div>
            <div class="field" style="margin-top: 20px;">
                <button class="btn btn-primary" id="save-password-btn">Update Password</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { supabase, requireAuth } from './auth.js';
    import { showToast } from './ui.js';
    import { mountCashierNav } from './cashier-nav.js';

    let currentUser = null;

    async function init() {
        mountCashierNav();

        const user = await requireAuth('index.html');
        if (!user) return;
        currentUser = user;

        const { data: profile, error } = await supabase
            .from('profiles')
            .select('full_name, branches(name)')
            .eq('id', user.id)
            .single();

        if (error) {
            console.error('Error loading profile:', error);
            showToast('Could not load your profile', 'error');
            return;
        }

        document.getElementById('full-name').value = profile?.full_name || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('branch-name').value = profile?.branches?.name || 'Not assigned';

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('profile-content').style.display = 'block';
    }

    document.getElementById('save-name-btn').addEventListener('click', async () => {
        const btn = document.getElementById('save-name-btn');
        const fullName = document.getElementById('full-name').value.trim();

        if (!fullName) {
            showToast('Name cannot be empty', 'warning');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Saving...';

        const { error } = await supabase
            .from('profiles')
            .update({ full_name: fullName })
            .eq('id', currentUser.id);

        btn.disabled = false;
        btn.innerHTML = 'Save Name';

        if (error) {
            showToast('Error saving name: ' + error.message, 'error');
        } else {
            showToast('Name updated successfully', 'success');
        }
    });

    document.getElementById('save-password-btn').addEventListener('click', async () => {
        const btn = document.getElementById('save-password-btn');
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (!newPassword || newPassword.length < 6) {
            showToast('Password must be at least 6 characters', 'warning');
            return;
        }
        if (newPassword !== confirmPassword) {
            showToast('Passwords do not match', 'warning');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Updating...';

        const { error } = await supabase.auth.updateUser({ password: newPassword });

        btn.disabled = false;
        btn.innerHTML = 'Update Password';

        if (error) {
            showToast('Error updating password: ' + error.message, 'error');
        } else {
            showToast('Password updated successfully', 'success');
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        }
    });

    init();
</script>
</body>
</html>
