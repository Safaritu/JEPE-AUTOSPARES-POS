<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Report | JEPE CASHIER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --admin-dark: #0f172a;
            --primary: #4f46e5; 
            --bg: #f8fafc; 
            --card: #ffffff; 
            --border: #e2e8f0; 
            --text-main: #1e293b; 
            --text-dim: #64748b;
            --success: #10b981; 
            --danger: #ef4444; 
            --warning: #f59e0b;
            --sidebar-width: 260px;
            --sidebar-collapsed: 70px;
            --header-height: 70px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
            overflow-x: hidden;
        }


        /* --- MAIN LAYOUT --- */
        .main-wrapper { 
            width: 100%; 
            margin-left: var(--sidebar-collapsed); 
            transition: margin-left 0.3s ease;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg) 0%, #ffffff 100%);
        }
        
        @media (min-width: 1024px) {
            .main-wrapper { 
                margin-left: var(--sidebar-collapsed); 
            }
        }

        .mobile-header {
            display: none; 
            background: var(--admin-dark); 
            color: white; 
            padding: 0 20px;
            align-items: center; 
            justify-content: space-between;
            position: fixed; 
            top: 0; 
            width: 100%; 
            height: 64px; 
            z-index: 2000;
        }

        .container { 
            padding: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        @media (max-width: 1024px) {
            .main-wrapper { 
                margin-left: 0; 
                padding-top: 64px;
            }
            .mobile-header { 
                display: flex; 
            }
            .container {
                padding: 20px 15px;
            }
        }

        /* --- PAGE HEADER --- */
        .page-header {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .page-title {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .page-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--admin-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title h1 i {
            color: var(--primary);
            background: #eef2ff;
            padding: 8px;
            border-radius: 12px;
            font-size: 1.2rem;
        }

        .page-title p {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-left: 45px;
        }

        .branch-badge {
            background: var(--primary);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .print-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .print-btn:hover {
            background: #6366f1;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
        }

        /* --- STATS CARDS --- */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }

        .stat-card { 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        .stat-card small { 
            color: var(--text-dim); 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.65rem; 
            display: block; 
            margin-bottom: 5px; 
        }

        .stat-card h2 { 
            margin: 0; 
            font-size: 1.5rem; 
            font-weight: 800; 
        }

        /* --- SECTION TITLE --- */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 25px 0 15px;
        }

        .section-title i {
            background: #eef2ff;
            padding: 8px;
            border-radius: 10px;
            color: var(--primary);
            font-size: 1rem;
        }

        .section-title h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--admin-dark);
        }

        /* --- TABLE STYLES --- */
        .table-container { 
            background: white; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 800px; 
        }
        
        th { 
            background: #f8fafc; 
            text-align: left; 
            padding: 16px; 
            font-size: 0.7rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            font-weight: 800;
            border-bottom: 1px solid var(--border);
        }
        
        td { 
            padding: 16px; 
            border-bottom: 1px solid var(--border); 
            font-size: 0.85rem; 
            vertical-align: middle;
        }

        tr:hover td {
            background: #fafaff;
        }

        /* --- MOBILE RECORD LIST --- */
        .mobile-records { 
            display: none; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .record-card { 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .record-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .card-time {
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .card-item {
            font-weight: 800;
            font-size: 1rem;
        }

        .card-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .detail-label {
            color: var(--text-dim);
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
        }

        .detail-value {
            font-weight: 700;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .table-container { display: none; }
            .mobile-records { display: flex; }
        }

        /* --- BADGES --- */
        .badge { 
            padding: 6px 12px; 
            border-radius: 30px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            display: inline-block;
        }
        
        .badge-cash { 
            background: #dcfce7; 
            color: #166534; 
        }
        .badge-mpesa { 
            background: #e0e7ff; 
            color: #4338ca; 
        }
        .badge-kcb { 
            background: #e0e7ff; 
            color: #4338ca; 
        }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 0.9rem;
        }


        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        @media print {
            .sidebar, .mobile-header, .menu-trigger, .overlay, .print-btn, .branch-badge {
                display: none !important;
            }
            .main-wrapper {
                margin-left: 0;
                padding: 20px;
            }
            .page-header {
                box-shadow: none;
                border: 1px solid #000;
            }
        }
    </style>
</head>
<body>



<div class="main-wrapper">
    <div class="mobile-header">
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:1.5rem;">☰</button>
        <div style="font-weight:800;">TODAY'S REPORT</div>
        <div style="width:24px;"></div>
    </div>

    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-title">
                <h1>
                    <i class="fas fa-calendar-day"></i>
                    <span>Daily Operations Report</span>
                </h1>
                <p id="report-date">Loading date...</p>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="branch-badge" id="branchDisplay">
                    <i class="fas fa-store"></i> <span id="branchName">Loading...</span>
                </div>
                <button class="print-btn" onclick="window.print()">
                    <i class="fas fa-print"></i> Print Report
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card" style="border-left-color: var(--primary);">
                <small>Total Sales Today</small>
                <h2 id="total-sales">Ksh 0</h2>
            </div>
            <div class="stat-card" style="border-left-color: var(--warning);">
                <small>Total Transactions</small>
                <h2 id="sales-count">0</h2>
            </div>
            <div class="stat-card" style="border-left-color: var(--success);">
                <small>Items Sold</small>
                <h2 id="items-sold">0</h2>
            </div>
        </div>

        <!-- Sales Records Section -->
        <div class="section-title">
            <i class="fas fa-receipt"></i>
            <h3>Today's Sales Records</h3>
        </div>

        <!-- Desktop Table View -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Unit Price</th>
                        <th>Total</th>
                        <th>Payment</th>
                    </tr>
                </thead>
                <tbody id="transaction-body">
                    <tr>
                        <td colspan="6" class="empty-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading today's sales...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Mobile Card View -->
        <div id="mobile-record-list" class="mobile-records"></div>
    </div>
</div>

<script type="module">
    import { supabase } from './auth.js';
    import { mountCashierNav } from './cashier-nav.js';

    let currentUser = null;
    let currentBranchId = null;
    let currentBranch = null;

    // ==================== BRANCH FUNCTIONS ====================

    function getCurrentBranchId() {
        const session = JSON.parse(localStorage.getItem('pos_session') || '{}');
        return session.branch?.id || currentBranchId;
    }

    async function loadUserProfile() {
        try {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return null;
            }
            
            currentUser = user;
            
            const { data: profile, error } = await supabase
                .from('profiles')
                .select(`
                    *,
                    branches (
                        id,
                        name,
                        code,
                        location
                    )
                `)
                .eq('id', user.id)
                .maybeSingle();
            
            if (error) throw error;
            if (!profile) {
                console.error("No profile found");
                return null;
            }
            
            currentBranchId = profile.branch_id;
            currentBranch = profile.branches;
            
            const session = {
                user: user,
                profile: profile,
                branch: profile.branches,
                role: profile.role
            };
            localStorage.setItem('pos_session', JSON.stringify(session));
            
            // Update sidebar with user's assigned branch
            const sidebarBranchName = document.querySelector('#sidebarBranchName span');
            if (profile.branches && sidebarBranchName) {
                sidebarBranchName.textContent = profile.branches.name;
            }
            
            // Update branch display
            const branchNameSpan = document.getElementById('branchName');
            if (branchNameSpan && profile.branches) {
                branchNameSpan.textContent = profile.branches.name;
            }
            
            return profile;
        } catch (error) {
            console.error("Error loading profile:", error);
            return null;
        }
    }


    // ==================== REPORT GENERATION ====================

    async function generateReport() {
        const branchId = getCurrentBranchId();
        if (!branchId) {
            console.error("No branch ID found");
            return;
        }

        const startOfDay = new Date();
        startOfDay.setHours(0,0,0,0);
        const endOfDay = new Date();
        endOfDay.setHours(23,59,59,999);

        // Update date display
        document.getElementById('report-date').innerText = new Date().toLocaleDateString('en-GB', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });

        try {
            // Fetch today's sales for this branch
            const { data: sales, error } = await supabase
                .from('sales')
                .select('*')
                .eq('branch_id', branchId)
                .gte('created_at', startOfDay.toISOString())
                .lte('created_at', endOfDay.toISOString())
                .order('created_at', { ascending: false });

            if (error) throw error;

            // Calculate stats
            const totalRevenue = sales.reduce((sum, s) => sum + Number(s.total_amount || 0), 0);
            const totalItems = sales.reduce((sum, s) => sum + (s.quantity || 0), 0);
            
            document.getElementById('total-sales').innerText = `Ksh ${totalRevenue.toLocaleString()}`;
            document.getElementById('sales-count').innerText = sales.length;
            document.getElementById('items-sold').innerText = totalItems;

            // Render tables
            renderTables(sales);

        } catch (error) {
            console.error("Error generating report:", error);
            document.getElementById('transaction-body').innerHTML = `
                <tr>
                    <td colspan="6" class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i>
                        <p>Error loading sales data</p>
                    </td>
                </tr>
            `;
        }
    }

    function getPaymentBadgeClass(method) {
        switch(method) {
            case 'Cash': return 'badge-cash';
            case 'Mpesa': return 'badge-mpesa';
            case 'KCB Paybill': return 'badge-kcb';
            default: return '';
        }
    }

    function renderTables(sales) {
        const tableBody = document.getElementById('transaction-body');
        const mobileList = document.getElementById('mobile-record-list');
        
        if (sales.length === 0) {
            const emptyHtml = `
                <tr>
                    <td colspan="6" class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No sales recorded today</p>
                    </td>
                </tr>
            `;
            tableBody.innerHTML = emptyHtml;
            mobileList.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>No sales recorded today</p>
                </div>
            `;
            return;
        }

        // Desktop table
        tableBody.innerHTML = sales.map(s => {
            const time = new Date(s.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const badgeClass = getPaymentBadgeClass(s.payment_method);
            
            return `
                <tr>
                    <td>${time}</td>
                    <td style="font-weight:600;">${s.item_name}</td>
                    <td>${s.quantity}</td>
                    <td>Ksh ${Number(s.unit_price).toLocaleString()}</td>
                    <td style="font-weight:700; color:var(--primary);">Ksh ${Number(s.total_amount).toLocaleString()}</td>
                    <td><span class="badge ${badgeClass}">${s.payment_method}</span></td>
                </tr>
            `;
        }).join('');

        // Mobile cards
        mobileList.innerHTML = sales.map(s => {
            const time = new Date(s.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const badgeClass = getPaymentBadgeClass(s.payment_method);
            
            return `
                <div class="record-card">
                    <div class="card-header">
                        <span class="card-item">${s.item_name}</span>
                        <span class="card-time">${time}</span>
                    </div>
                    
                    <div class="card-details">
                        <div>
                            <div class="detail-label">Quantity</div>
                            <div class="detail-value">${s.quantity}</div>
                        </div>
                        <div>
                            <div class="detail-label">Unit Price</div>
                            <div class="detail-value">Ksh ${Number(s.unit_price).toLocaleString()}</div>
                        </div>
                        <div>
                            <div class="detail-label">Total</div>
                            <div class="detail-value" style="color:var(--primary);">Ksh ${Number(s.total_amount).toLocaleString()}</div>
                        </div>
                        <div>
                            <div class="detail-label">Payment</div>
                            <div><span class="badge ${badgeClass}">${s.payment_method}</span></div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        mountCashierNav();
        const profile = await loadUserProfile();
        if (profile) {
            await generateReport();
        }
    });
</script>
</body>
</html>
